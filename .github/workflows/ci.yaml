# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║   HYBE Fan Platform — GitHub Actions CI/CD                                   ║
# ║   Trigger: push to main → build → push ECR → promote Helm tag (GitOps)       ║
# ║                                                                              ║
# ║   GitOps Flow:                                                               ║
# ║     1. Developer pushes code                                                 ║
# ║     2. CI builds Docker image, pushes to ECR                                 ║
# ║     3. CI runs scripts/promote.sh to update image tag in values.yaml         ║
# ║     4. CI commits + pushes values.yaml back to Git                           ║
# ║     5. ArgoCD detects drift → automatically syncs to EKS                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: CI - Build, Push, Promote

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "helm/**"
      - ".github/workflows/**"

  pull_request:
    branches: [main]
    paths:
      - "apps/**"

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:    ap-northeast-2
  ECR_REGISTRY:  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  EKS_CLUSTER:   hybe-fan-platform

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ticket-service, merch-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r apps/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-cov flake8 bandit

  # ── Job 2: Helm Lint ──────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.2"

      - name: Helm dependency update
        run: helm dependency update helm/hybe-platform

      - name: Helm Lint
        run: helm lint helm/hybe-platform/ --strict

      - name: Helm template (dry-run render)
        run: |
          helm template hybe-fan-platform helm/hybe-platform/ \
            --set ticketService.image.tag=test \
            --set merchService.image.tag=test \
            --set apiGateway.image.tag=test \
            --debug > /dev/null

  # ── Job 3: Build & Push to ECR ───────────────────────────────────────────────
  build-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, helm-lint]
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [ticket-service, merch-service, api-gateway]
      fail-fast: false    # Build all service even if one fails
    
    permissions:
      id-token: write   # OIDC auth to AWS (no long-lived secrets!)
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC - no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="$(date +%Y%m%d)-${SHA_SHORT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${ECR_REGISTRY}/hybe/${{ matrix.service }}:${VERSION}" >> $GITHUB_OUTPUT
          echo "Building: hybe/${{ matrix.service }}:${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}/
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.ECR_REGISTRY }}/hybe/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format:    sarif
          output:    trivy-results.sarif
          severity:  CRITICAL,HIGH
          exit-code: "1"    # Fail build on CRITICAL CVEs

      - name: Upload Trivy scan results to Github Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Job 4: GitOps Promotion (the Pull-Based delivery trigger) ─────────────────
  promote:
    name: GitOps Promote → ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write   # Push updated values.yaml back to repo
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "ci-bot@hybe.com"
          git config user.name "HYBE CI Bot"

      - name: Determine new image tag
        id: tag
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="$(date +%Y%m%d)-${SHA_SHORT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update Helm values.yaml with new image tags (GitOps trigger)
        run: |
          chmod +x scripts/promote.sh
          ./scripts/promote.sh ${{ steps.tag.outputs.version }}

      - name: Commit and push updated values.yaml
        run: |
          git add helm/hybe-platform/values.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): promote images to ${{ steps.tag.outputs.version }}
          
          Services updated:
          - ticket-service: ${{ steps.tag.outputs.version }}
          - merch-service:  ${{ steps.tag.outputs.version }}
          - api-gateway:    ${{ steps.tag.outputs.version }}
          
          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}
          
          [skip ci]"
          git push origin main

      - name: Notify Slack - Deployment promoted
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 *HYBE Fan Platform* - New version `${{ steps.tag.outputs.version }}` promoted to production.\nArgoCD will sync within 3 minutes.\nTriggered by: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

 
