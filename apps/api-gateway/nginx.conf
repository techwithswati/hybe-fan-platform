# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║   HYBE Fan Platform - NGINX API Gateway                                      ║
# ║   Rate limiting: 50 req/s per IP (burst 200)                                 ║
# ║   Routes: /api/v1/tickets/* → ticket-service:8080                            ║
# ║           /api/v1/merch/*   → merch-service:8081                             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    gzip                on;
    gzip_types          application/json text/plain;
    gzip_min_length     256;

    # ── Rate Limiting Zones ────────────────────────────────────────────────────
    # Global rate limit: 50 req/s per IP, 10MB memory zone
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=50r/s;

    # Ticket purchase endpoint: stricter - 10 req/s per IP (prevent bots)
    limit_req_zone $binary_remote_addr zone=ticket_purchase:10m rate=10r/s;

    # Merch purchase: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=merch_purchase:10m rate=5r/s;

    limit_req_status 429;
    
    # ── Upstream Services ──────────────────────────────────────────────────────
    upstream ticket_service {
        least_conn;
        server ticket-service:8080;
        keepalive 64;
    }

    upstream merch_service {
        least_conn;
        server merch-service:8081;
        keepalive 64;
    }

    # ── Main Server ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options         "DENY"            always;
        add_header X-Content-Type_Options  "nosniff"         always;
        add_header X-XSS-Protection        "1; mode=block"   always;
        add_header X-Served-By             "hybe-gateway"    always;

        # ── Health Check (no rate limit) ────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"hybe-api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Ticket Service Routes ───────────────────────────────────────────
        location /api/v1/tickets/availability {
            limit_req zone=global_limit burst=500 nodelay;
            proxy_pass http://ticket_service;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/tickets/purchase {
            # Stricter limit on purchase endpoint
            limit_req zone=ticket_purchase burst=50 nodelay;
            proxy_pass http://ticket_service;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/tickets/ {
            limit_req zone=global_limit burst=200 nodelay;
            proxy_pass http://ticket_service;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Merch Service Routes ────────────────────────────────────────────
        location /api/v1/merch/purchase {
            limit_req zone=merch_purchase burst=30 nodelay;
            proxy_pass http://merch_service;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/merch/ {
            limit_req zone=global_limit burst=200 nodelay;
            proxy_pass http://merch_service;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Rate limit error response ───────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"rate_limited","message":"Too many requests. Wait a moment and try again.","retry_after":1}';
        }
    }
}
