# ── Ticket Service Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ticketService.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.ticketService.name }}
    app.kubernetes.io/name: {{ .Values.ticketService.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.ticketService.image.tag | quote }}
    environment: {{ .Values.global.environment }}
  annotations:
    deployment.kubernetes.io/revision: "1"
    # ArgoCD auto-sync annotation - ArgoCD tracks this deployment
    argocd.argoproj.io/managed-by: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ticketService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.ticketService.name }}
  strategy:
    type: {{ .Values.ticketService.updateStrategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.ticketService.updateStrategy.maxSurge }}
      maxUnavailable: {{ .Values.ticketService.updateStrategy.maxUnavailable }}
  template:
    metadata:
      labels:
        app: {{ .Values.ticketService.name }}
        version: {{ .Values.ticketService.image.tag | quote }}
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: 60

      # Spread pods across availability zones
      {{- with .Values.ticketService.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Values.ticketService.name }}
          image: "{{ .Values.ticketService.image.repository }}:{{ .Values.ticketService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP

          env:
            # Pod identity via Kubernetes Downward API (tracked in DB logs)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # App config
            - name: TOTAL_TICKETS
              value: {{ .Values.ticketService.env.TOTAL_TICKETS | quote }}
            - name: REDIS_HOST
              value: {{ .Values.ticketService.env.REDIS_HOST | quote }}
            # RDS credentials from Kubernetes Secret
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: password
            - name: DB_NAME
              value: "hybe_tickets"

          resources:
            {{- toYaml .Values.ticketService.resources | nindent 12 }}

          livenessProbe:
            httpGet:
              path: {{ .Values.ticketService.livenessProbe.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.ticketService.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ticketService.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.ticketService.livenessProbe.failureThreshold }}
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: {{ .Values.ticketService.readinessProbe.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.ticketService.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ticketService.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.ticketService.readinessProbe.failureThreshold }}
            timeoutSeconds: 5

          # Graceful shutdown — finish in-flight requests
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      # Node affinity: prefer nodes with more CPU headroom
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - {{ .Values.ticketService.name }}
                topologyKey: kubernetes.io/hostname

---

# ── Merch Service Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
