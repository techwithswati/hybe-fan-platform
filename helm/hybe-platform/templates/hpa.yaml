{{/*
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║   HYBE Platform — Horizontal Pod Autoscaler (HPA) Templates                  ║
  ║   Key resume talking point: scales 3 → 50 pods under 90s during drops.       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
*/}}

# ── Ticket Service HPA ─────────────────────────────────────────────────────────
{{- if .Values.ticketService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.ticketService.name }}-hpa
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.ticketService.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    # Human-readable description for Grafana annotations
    description: "Scales ticket-service pods based on CPU/Memory - responds to fan traffic spikes"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.ticketService.name }}

  minReplicas: {{ .Values.ticketService.hpa.minReplicas }}
  maxReplicas: {{ .Values.ticketService.hpa.maxReplicas }}

  metrics:
    # Primary trigger: CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ticketService.hpa.targetCPUUtilizationPercentage }}
    
    # Secondary trigger: Memory pressure
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.ticketService.hpa.targetMemoryUtilizationPercentage }}

  behaviour:
    scaleUp:
      # Aggressive scale-up: during a ticket drop every second counts
      stabilizationWindowSeconds: {{ .Values.ticketService.hpa.scaleUpStabilizationWindowSeconds }}
      policies:
        # Can add up to 10 pods per 30 seconds
        - type: Pods
          value: 10
          periodSeconds: 30
        # OR double current pod count per 60 seconds (whichever is larger)
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      # Conservative scale-down: fans linger after a drop, keep capacity up
      stabilizationWindowSeconds: {{ .Values.ticketService.hpa.scaleDownStabilizationWindowSeconds }}
      policies:
        # Removes at most 2 pods per 60 seconds during scale-down
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
{{- end }}

---

# ── Merch Service HPA ─────────────────────────────────────────────────────────
{{- if .Values.merchService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.merchService.name }}-hpa
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.merchService.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    description: "Scales merch-service pods - responds to flash sale traffic spikes"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.merchService.name }}

  minReplicas: {{ .Values.merchService.hpa.minReplicas }}
  maxReplicas: {{ .Values.merchService.hpa.maxReplicas }}

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.merchService.hpa.targetCPUUtilizationPercentage }}
    
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.merchService.hpa.targetMemoryUtilizationPercentage }}

  behaviour:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.merchService.hpa.scaleUpStabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: 10
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: {{ .Values.merchService.hpa.scaleDownStabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
{{- end }}

---

# ── API Gateway HPA ─────────────────────────────────────────────────────────
{{- if .Values.apiGateway.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.apiGateway.name }}-hpa
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.apiGateway.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.apiGateway.name }}

  minReplicas: {{ .Values.apiGateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.apiGateway.hpa.maxReplicas }}

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiGateway.hpa.targetCPUUtilizationPercentage }}
    
  behaviour:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
{{- end }}

---

# ── Pod Disruption Budgets (keep platform alive during node upgrades) ─────────────────────────────────────────────────────────
{{- if .Values.ticketService.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.ticketService.name }}-pdb
  namespace: {{ .Values.namespace }}
spec:
  minAvailable: {{ .Values.ticketService.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Values.ticketService.name }}
{{- end }}

---

{{- if .Values.merchService.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.merchService.name }}-pdb
  namespace: {{ .Values.namespace }}
spec:
  minAvailable: {{ .Values.merchService.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Values.merchService.name }}
{{- end }}
