# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║   HYBE Fan Platform — Helm Values                                            ║
# ║   Single source of truth. ArgoCD reads this file on every Git commit.        ║
# ║   To deploy a new image: run scripts/promote.sh <new-tag>                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

global:
  environment: production
  region: ap-northeast-2                        # Seoul
  ecrRegsitry: "123456789.dkr.ecr.ap-northeast-2.amazonaws.com/hybe"
  imagePullPolicy: IfNotPresent

# ── Namespace ──────────────────────────────────────────────────────────────────
namespace: hybe-prod

# ── Ticket Service ─────────────────────────────────────────────────────────────
ticketService:
  name: ticket-service
  image:
    repository: "123456789.dkr.ecr.ap-northeast-2.amazonaws.com/hybe/ticket-service"
    tag: "1.4.2"                    # ← Updated by CI via scripts/promote.sh

  replicaCount: 3                   # Baseline replicas (HPA controls max)

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
    scaleUpStabilizationWindowSeconds: 30               # Fast scale-up during drops
    scaleDownStabilizationWindowSeconds: 300            # Slow scale-down (fan activity lingers)

  service:
    type: ClusterIP
    port: 8000

  env:
    TOTAL_TICKETS: "5000"
    REDIS_HOST: "redis-master"

  # Probes
  livenessProbe:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    path: /health/ready
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

  # Pod Disruption Budget - Keep at least 2 pods during rollouts
  pdb:
    enabled: true
    minAvailable: 2

  # Rolling update - zero downtime
  updateStrategy:
    type: RollingUpdate
    maxSurge: 2
    maxUnavailable: 0

  # Spread pods across nodes + AZs
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# ── Merch Service ──────────────────────────────────────────────────────────────
merchService:
  name: merch-service
  image:
    repository: "123456789.dkr.ecr.ap-northeast-2.amazonaws.com/hybe/merch-service"
    tag: "1.4.2"

  replicaCount: 3

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
    scaleUpStabilizationWindowSeconds: 30
    scaleDownStabilizationWindowSeconds: 300

  service:
    type: ClusterIP
    port: 8081

  env:
    CART_TTL_SECONDS: "300"
    REDIS_HOST: "redis-master"

  livenessProbe:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 10

  readinessProbe:
    path: /health/ready
    initialDelaySeconds: 10
    periodSeconds: 5

  pdb:
    enabled: true
    minAvailable: 2

  updateStrategy:
    type: RollingUpdate
    maxSurge: 2
    maxUnavailable: 0

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

# ── API Gateway ────────────────────────────────────────────────────────────────
apiGateway:
  name: api-gateway
  image:
    repository: "123456789.dkr.ecr.ap-northeast-2.amazonaws.com/hybe/api-gateway"
    tag: "1.4.2"

  replicaCount: 2

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  service:
    type: ClusterIP
    port: 80

# ── Ingress (AWS ALB) ──────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: hybe-fan-platform-alb
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:123456789:certificate/xxxx"
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Connection settings for 50k+ concurrent connections
    alb.ingress.kubernetes.io/load-balancer-attributes: >
      idle_timeout.timeout_seconds=60,
      routing.http2.enabled=true,
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=hybe-alb-logs
  host: "api.fans.hybe.com"

# ── RDS Database Credentials (from AWS Secrets Manager) ───────────────────────
database:
  host: "hybe-prod.cluster-xxxx.ap-northeast-2.rds.amazonaws.com"
  port: 3306
  secretName: hybe-rds-credentials               # K8s secret, populated by External Secrets Operator

# ── Redis (Bitnami subchart) ───────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: false                              # Internal cluster only, no intenet exposure
  master:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
      persistence:
        enabled: true
        size: 8Gi
  replica:
    replacement: 1

# ── ServiceAccount (IRSA - IAM Role for Service Account) ─────────────────────
serviceAccount:
  create: true
  name: hybe-platform-sa
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/hybe-platform-irsa"
    